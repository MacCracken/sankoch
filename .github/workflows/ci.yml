name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CYRIUS_VERSION: "4.10.0"

jobs:
  build:
    name: Build & Bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Cyrius
        run: |
          git clone --depth 1 --branch "${CYRIUS_VERSION}" https://github.com/MacCracken/cyrius.git /tmp/cyrius
          sudo cp /tmp/cyrius/build/cc3 /usr/local/bin/cc3
          sudo chmod +x /usr/local/bin/cc3
          cc3 --version
      - name: Verify bundle compiles
        run: |
          cat dist/sankoch.cyr | cc3 > build/sankoch 2>&1 && chmod +x build/sankoch
          echo "sankoch: $(wc -c < build/sankoch) bytes"
      - name: Verify bundle is up to date
        run: |
          sh scripts/bundle.sh
          if ! diff -q dist/sankoch.cyr dist/sankoch.cyr.bak 2>/dev/null; then
            echo "NOTE: bundle regenerated (may differ from committed)"
          fi

  test:
    name: Test Suite
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Cyrius
        run: |
          git clone --depth 1 --branch "${CYRIUS_VERSION}" https://github.com/MacCracken/cyrius.git /tmp/cyrius
          sudo cp /tmp/cyrius/build/cc3 /usr/local/bin/cc3
          sudo chmod +x /usr/local/bin/cc3
          # Vendor stdlib for test includes
          mkdir -p lib
          cp /tmp/cyrius/lib/*.cyr lib/ 2>/dev/null || true
      - name: Run test suites
        run: |
          set +e
          pass=0; fail=0
          for t in tests/*.tcyr; do
            name=$(basename "$t" .tcyr)
            # Skip non-test files before compile
            case "$name" in investigate_*) echo "SKIP: $name"; continue ;; esac
            tmpbin="/tmp/ci_t_$$"
            cat "$t" | cc3 > "$tmpbin" 2>/dev/null && chmod +x "$tmpbin"
            if [ $? -ne 0 ]; then echo "FAIL (compile): $name"; fail=$((fail+1)); continue; fi
            output=$("$tmpbin" 2>&1) && ec=0 || ec=$?
            rm -f "$tmpbin"
            f=$(echo "$output" | grep -o '[0-9]* failed' | tail -1 | grep -o '^[0-9]*')
            if [ "$ec" -ne 0 ] || { [ -n "$f" ] && [ "$f" -gt 0 ]; }; then
              echo "FAIL: $name"; fail=$((fail+1))
            else
              p=$(echo "$output" | grep -o '[0-9]* passed' | tail -1 | grep -o '^[0-9]*')
              echo "PASS: $name ($p passed)"
              pass=$((pass+1))
            fi
          done
          echo "$pass passed, $fail failed"
          test $fail -eq 0

  benchmarks:
    name: Benchmarks
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Cyrius
        run: |
          git clone --depth 1 --branch "${CYRIUS_VERSION}" https://github.com/MacCracken/cyrius.git /tmp/cyrius
          sudo cp /tmp/cyrius/build/cc3 /usr/local/bin/cc3
          sudo chmod +x /usr/local/bin/cc3
          mkdir -p lib
          cp /tmp/cyrius/lib/*.cyr lib/ 2>/dev/null || true
      - name: Run benchmarks
        run: |
          cat benches/bench_sankoch.bcyr | cc3 > /tmp/bench && chmod +x /tmp/bench
          /tmp/bench
