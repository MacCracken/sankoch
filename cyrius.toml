[package]
name = "sankoch"
version = "0.1.0"
description = "Lossless compression library — LZ4, DEFLATE, zlib, gzip"
license = "GPL-3.0-only"
repository = "https://github.com/MacCracken/sankoch"

[deps]
# thread.cyr for mutex-based thread safety on compress/decompress globals
stdlib = ["thread", "alloc", "syscalls", "fnptr"]

[build]
src = "src/lib.cyr"
out = "build/sankoch"

[toolchain]
min = "4.9.3"
